name: Publish Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  homebrew:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@f865c8b0dbebd6e263cc06782a0e974c61cf12d2 # v4.2
        with:
          formula-name: git-reconcile
          formula-path: Formula/git-reconcile.rb
          homebrew-tap: matthewevans/homebrew-tap
          base-branch: main
          tag-name: ${{ github.event.release.tag_name }}
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
