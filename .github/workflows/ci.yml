name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show tool versions
        run: |
          git --version
          bash --version
      - name: Lint shell scripts
        run: make lint
      - name: Run integration tests
        run: make test
